services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ventagamer-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "VentaGamer2024!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'VentaGamer2024!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqldata:
